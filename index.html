<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AV Room Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        body { margin: 0; font-family: system-ui, sans-serif; background: #111827; color: #f3f4f6; }
        #canvas { display: block; }
    </style>
</head>
<body>
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-700 p-4 overflow-auto">
            <h1 class="text-2xl font-bold mb-6">AV Room Planner</h1>
            <div class="space-y-4">
                <button onclick="addMic()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg">Add Microphone</button>
                <button onclick="addDisplay()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-lg">Add Display</button>
                <button onclick="addSpeaker()" class="w-full bg-amber-600 hover:bg-amber-700 py-3 rounded-lg">Add Speaker</button>
                <button onclick="importCAD()" class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-lg">Import CAD (glTF/GLB)</button>
            </div>
        </div>
        <!-- 3D Canvas -->
        <div class="flex-1 relative">
            <canvas id="canvas"></canvas>
        </div>
        <!-- Inspector -->
        <div class="w-80 bg-zinc-900 border-l border-zinc-700 p-4 overflow-auto">
            <h2 class="text-xl font-semibold mb-4">Inspector</h2>
            <p class="text-zinc-400">Select an object in the 3D view</p>
        </div>
    </div>
    <script>
        // Basic Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1f2937);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth * 0.6 / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 30);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('canvas'), antialias: true});
        renderer.setSize(window.innerWidth * 0.6, window.innerHeight);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        function addMic() { alert('Microphone added (demo)'); }
        function addDisplay() { alert('Display added (demo)'); }
        function addSpeaker() { alert('Speaker added (demo)'); }
        function importCAD() { alert('CAD import ready - upload .glb/.gltf (full implementation coming)'); }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth * 0.6 / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth * 0.6, window.innerHeight);
        });
    </script>
</body>
</html>
